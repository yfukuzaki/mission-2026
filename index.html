<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街歩きミッション・コントロール</title>
    <style>
        body { background: #121212; color: #00ffcc; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 15px; text-align: center; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        h1 { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px; }
        .group-display { font-size: 2rem; color: #fff; font-weight: bold; margin-bottom: 10px; }
        
        .point-container { margin-bottom: 10px; display: flex; justify-content: center; align-items: baseline; gap: 8px; }
        .point-status { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .status-locked { background: #ffcc00; color: #000; }
        .status-confirmed { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc; }
        .total-pt { font-size: 1.8rem; font-weight: bold; color: #fff; }

        .timer-container { display: flex; justify-content: space-around; border-top: 1px solid #333; margin-top: 10px; padding-top: 15px; }
        .timer-box { flex: 1; }
        .timer-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .timer-value { font-size: 1.6rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        #elapsed { color: #00ffcc; }
        #remaining { color: #ffcc00; }

        .mission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .panel { 
            aspect-ratio: 1/1; background: #2d2d2d; border: 2px dashed #444; border-radius: 15px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            position: relative; overflow: hidden; transition: 0.3s; cursor: pointer;
        }
        .panel.cleared { background: #fff; border: 2px solid #00ffcc; color: #333; cursor: default; }
        .panel-label { font-size: 0.9rem; font-weight: bold; }
        .tap-hint { font-size: 0.6rem; color: #666; margin-top: 5px; }
        
        .sub-matrix { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 10px; }
        .sub-chip { font-size: 0.6rem; color: #888; background: #2a2a2a; padding: 5px 0; border-radius: 4px; border: 1px solid #333; }
        .sub-chip.cleared { color: #00ffcc; border-color: #00ffcc; background: rgba(0,255,204,0.1); font-weight: bold; }

        .stamp { 
            display: none; position: absolute; font-weight: bold; font-size: 1.2rem;
            color: #ff3366; border: 4px solid #ff3366; padding: 6px; border-radius: 8px;
            transform: rotate(-20deg); z-index: 2;
        }
        .panel.cleared .stamp { display: block; animation: stampAnim 0.4s cubic-bezier(.17,.67,.83,.67); }
        .clear-time { font-size: 0.65rem; color: #ff3366; margin-top: 4px; font-weight: bold; }

        @keyframes stampAnim { 0% { transform: scale(4) opacity: 0; } 100% { transform: scale(1) opacity: 1; } }

        #modalOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content { background: #222; border: 2px solid #00ffcc; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; position: relative; }
        #modalMissionText { color: #fff; font-size: 1.3rem; font-weight: bold; line-height: 1.4; margin-bottom: 25px; }
        .pass-info { font-size: 0.9rem; color: #ffcc00; margin-bottom: 15px; font-weight: bold; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-close, .btn-pass { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-close { background: #444; color: #fff; }
        .btn-pass { background: #ffcc00; color: #000; }

        select, input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        #sendBtn { background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; }
        #sendBtn:disabled { background: #444 !important; color: #777 !important; cursor: not-allowed; }

        .congrats-card { background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%); border: 2px solid #ffcc00; }
        .congrats-text { font-size: 1.6rem; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .result-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #ffcc00; }
        .navi-text { font-size: 1.1rem; color: #fff; background: #c0392b; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        #goalBtn { background: #e67e22; color: white; font-size: 1.2rem; border: none; cursor: pointer; box-shadow: 0 4px #d35400; }
    </style>
</head>
<body>

<div class="card">
    <div class="point-container">
        <span id="ptStatus" class="point-status status-locked">獲得見込み</span>
        <span id="totalPoints" class="total-pt">0</span>
        <span style="font-size: 0.8rem; color: #888; font-weight: bold;">PT</span>
    </div>
    <div id="groupDisplay" class="group-display">GROUP --</div>
    <div class="timer-container">
        <div class="timer-box">
            <div class="timer-label">ミッション経過</div>
            <div id="elapsed" class="timer-value">00:00:00</div>
        </div>
        <div class="timer-box" style="border-left: 1px solid #333;">
            <div class="timer-label">残り時間</div>
            <div id="remaining" class="timer-value">--:--:--</div>
        </div>
    </div>
</div>

<div class="card" id="missionCard">
    <h1>Core Mission (タップで詳細)</h1>
    <div class="mission-grid">
        <div class="panel" id="p1" onclick="openMission(1)"><div class="panel-label">ミッション 1</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t1"></div></div></div>
        <div class="panel" id="p2" onclick="openMission(2)"><div class="panel-label">ミッション 2</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t2"></div></div></div>
        <div class="panel" id="p3" onclick="openMission(3)"><div class="panel-label">ミッション 3</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t3"></div></div></div>
        <div class="panel" id="p4" onclick="openMission(4)"><div class="panel-label">ミッション 4</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t4"></div></div></div>
    </div>
</div>

<div class="card">
    <h1>Sub Mission Log</h1>
    <div class="sub-matrix" id="subMatrix"></div>
</div>

<div id="modalOverlay"><div class="modal-content">
    <div id="modalMissionTitle" style="color:#00ffcc; font-size:1.2rem; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">ミッション内容</div>
    <div id="modalMissionText">内容を読み込み中...</div>
    <div class="pass-info">【全体共通】残りパス: <span id="passCount">--</span>/4回</div>
    <div class="modal-btns"><button class="btn-pass" id="passBtn" onclick="passMission()">パスして引き直す</button><button class="btn-close" onclick="closeMission()">閉じる</button></div>
</div></div>

<div class="card" id="inputCard">
    <h1>Mission Submission</h1>
    <select id="missionTarget">
        <optgroup label="コアミッション" id="optCore"></optgroup>
        <optgroup label="サブミッション" id="optSub"></optgroup>
    </select>
    <input type="file" id="photoInput" accept="image/*">
    <button id="sendBtn" onclick="sendData()">ミッション完了報告を送信</button>
</div>

<script>
    // --- データ定義 ---
    const CORE_T_POOL = [
        "[T]地面の影だけで「星型」や「円」を作ってパシャ！",
        "[T]おいしいものを食べて幸せな顔の新入生をパシャ！",
        "[T]クローバー停留所でバスを待ちわびる様子をパシャ！",
        "[T]全員笑顔で画角内に鳩が3匹いる状態でパシャ！",
        "[T]ばかでかい万華鏡の下で見上げている写真をパシャ！",
        "[T]びわ湖を背景に全員でジャンプした瞬間をパシャ！",
        "[T]黒壁の熊と一緒にガラスを作るポーズでパシャ"
    ];
    const CORE_OTHER_POOL = [
        "[他]人文字で「NBio」の文字を再現してパシャ！",
        "[他]秘密基地っぽい場所で「潜入捜査風」ポーズでパシャ！",
        "[他]異なる学科の2グループが合流して笑顔でパシャ！",
        "[他]左から右へだんだん姿勢を正す「進化の図」をパシャ！",
        "[他]黒壁ガラス館を背に「青春だろ？」ポーズでパシャ！",
        "[他]お花ぎつねと同じポーズでパシャ！",
        "[他]フィギュアになったつもりで静止してパシャ！",
        "[他]歌舞伎絵と同じポーズでパシャ！"
    ];
    const SUB_POOL = [
        {id:"S01", pt:10, t:"「初」の漢字が書かれた飛び出し坊や"}, {id:"S02", pt:10, t:"一番男前のナマズ"}, {id:"S03", pt:10, t:"とにかく黒色のもの"}, {id:"S04", pt:10, t:"酒樽が３つ並んだ場所"}, {id:"S05", pt:10, t:"たぬきの置物"}, {id:"S06", pt:10, t:"近江牛コロッケを神々しく掲げる"}, {id:"S07", pt:10, t:"食パンの像"}, {id:"S08", pt:10, t:"一番食べたいものを指差し"},
        {id:"S09", pt:20, t:"パンのぬいぐるみ"}, {id:"S10", pt:20, t:"黒いソフトクリーム(モノクロ)"}, {id:"S11", pt:20, t:"四葉のクローバー"}, {id:"S12", pt:20, t:"石化したアンパンマン"}, {id:"S13", pt:20, t:"石田三成の飛び出し坊や"}, {id:"S14", pt:20, t:"武将ver.飛び出し坊や"}, {id:"S15", pt:20, t:"微生物の恩恵"}, {id:"S16", pt:20, t:"大げさな「うまい！」顔"}, {id:"S17", pt:20, t:"ベンチでリラックス"}, {id:"S18", pt:20, t:"一番きれいな青"}, {id:"S19", pt:20, t:"壁のカレーを受け止める"},
        {id:"S20", pt:30, t:"｢乙女桜｣の異名を持つ桜"}, {id:"S21", pt:30, t:"奇妙な瓢箪"}, {id:"S22", pt:30, t:"手作り感満載のクワガタ"}, {id:"S23", pt:30, t:"他グループと『乾杯！』"}, {id:"S24", pt:30, t:"木彫りのカマキリ"}, {id:"S25", pt:30, t:"食べ物に対して深々と礼"}, {id:"S26", pt:30, t:"遠近法トリック写真"}, {id:"S27", pt:30, t:"「ふかふか」な苔"}, {id:"S28", pt:30, t:"質感を表現する顔"}, {id:"S29", pt:30, t:"パレイドリア（顔に見える場所）"}, {id:"S30", pt:30, t:"一番『エモい』路地"}
    ];

    const POST_URL = "https://defaultce7b79c559554825ab1fb5c84e9e63.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a0c68a0b0f724618898d1e98ea02a174/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Ntxy587vPD_sKfECziby9_yqeew3a_OuWxq3m1FFRdc"; 
    const GOAL_TIME = new Date(2026, 3, 3, 16, 0, 0); 

    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get('g') || "未設定";
    document.getElementById("groupDisplay").innerText = `GROUP ${groupId}`;

    let currentOpenMissionIndex = 0;
    let timerPaused = false;

    // --- ロジック：ミッション選出（T：1,2番 / 他：3,4番） ---
    function getMissionText(mIndex) {
        const seed = (groupId === "未設定") ? 0 : parseInt(groupId);
        const targetPool = (mIndex <= 2) ? CORE_T_POOL : CORE_OTHER_POOL;
        const myPassedIds = JSON.parse(localStorage.getItem(`passed_g${groupId}_m${mIndex}`) || "[]");
        let idx = (seed * 7 + mIndex * 13 + myPassedIds.length * 31) % targetPool.length;
        return { text: targetPool[idx], rawIndex: idx };
    }

    function getTotalPassCount() {
        let count = 0;
        for(let i=1; i<=4; i++) count += JSON.parse(localStorage.getItem(`passed_g${groupId}_m${i}`) || "[]").length;
        return count;
    }

    function openMission(num) {
        if (JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]").find(h => h.num == num)) return;
        currentOpenMissionIndex = num;
        const mission = getMissionText(num); 
        const totalPassed = getTotalPassCount();
        document.getElementById("modalMissionTitle").innerText = `コアミッション ${num}`;
        document.getElementById("modalMissionText").innerText = mission.text;
        document.getElementById("passCount").innerText = 4 - totalPassed;
        document.getElementById("passBtn").disabled = totalPassed >= 4;
        document.getElementById("modalOverlay").style.display = "flex";
    }

    function closeMission() { document.getElementById("modalOverlay").style.display = "none"; }

    function passMission() {
        if (getTotalPassCount() < 4) {
            let pIds = JSON.parse(localStorage.getItem(`passed_g${groupId}_m${currentOpenMissionIndex}`) || "[]");
            pIds.push(getMissionText(currentOpenMissionIndex).rawIndex);
            localStorage.setItem(`passed_g${groupId}_m${currentOpenMissionIndex}`, JSON.stringify(pIds));
            openMission(currentOpenMissionIndex);
        }
    }

    function refreshUI() {
        const coreLogs = JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]");
        const subLogs = JSON.parse(localStorage.getItem(`sub_logs_g${groupId}`) || "[]");

        coreLogs.forEach(log => {
            const p = document.getElementById(`p${log.num}`); const t = document.getElementById(`t${log.num}`);
            if(p) { p.classList.add('cleared'); p.onclick = null; }
            if(t) t.innerText = log.time;
        });

        const matrix = document.getElementById("subMatrix"); matrix.innerHTML = "";
        let currentPts = 0;
        SUB_POOL.forEach(s => {
            const isDone = subLogs.includes(s.id);
            if(isDone) currentPts += s.pt;
            matrix.innerHTML += `<div class="sub-chip ${isDone?'cleared':''}">${s.id}</div>`;
        });
        document.getElementById("totalPoints").innerText = currentPts;

        const ptStatus = document.getElementById("ptStatus");
        if(coreLogs.length >= 4) {
            ptStatus.innerText = "確定ポイント"; ptStatus.className = "point-status status-confirmed";
        } else {
            ptStatus.innerText = "獲得見込み"; ptStatus.className = "point-status status-locked";
        }

        const optCore = document.getElementById("optCore"); optCore.innerHTML = "";
        for(let i=1; i<=4; i++) {
            if(!coreLogs.find(l => l.num == i)) optCore.innerHTML += `<option value="M${i}">コア：ミッション ${i}</option>`;
        }
        const optSub = document.getElementById("optSub"); optSub.innerHTML = "";
        SUB_POOL.forEach(s => {
            if(!subLogs.includes(s.id)) optSub.innerHTML += `<option value="${s.id}">サブ：${s.id} ${s.t}</option>`;
        });

        if (coreLogs.length >= 4) {
            timerPaused = true;
            const finalElapsed = coreLogs[coreLogs.length-1].elapsedAt;
            document.getElementById("inputCard").className = "card congrats-card";
            document.getElementById("inputCard").innerHTML = `
                <div class="congrats-text">🎉 MISSION COMPLETE!!</div>
                <div class="result-box">
                    <div style="font-size: 0.8rem; color: #ffcc00;">TOTAL CLEAR TIME</div>
                    <div style="font-size: 2.2rem; font-weight: bold; color: #fff;">${finalElapsed}</div>
                    <div style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">最終確定ポイント： <span style="color:#00ffcc; font-size:1.5rem;">${currentPts}</span> pt</div>
                </div>
                <button id="goalBtn" onclick="sendGoalNotification()">🚩 今から本部に行く</button>
                <div class="navi-text">🚩 長浜バイオ大学サテライトオフィスへ向かい、この画面を提示してください！</div>
            `;
        }
    }

    async function sendData() {
        if (groupId === "未設定") return alert("グループ番号が不明です。QRコードからアクセスし直してください。");
        const btn = document.getElementById("sendBtn");
        const val = document.getElementById("missionTarget").value;
        const fileInput = document.getElementById("photoInput");
        if (!fileInput.files[0]) return alert("画像を選んでください。");

        btn.disabled = true; btn.innerText = "送信中...";
        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            const now = new Date();
            const timeStr = now.getFullYear() + ("0"+(now.getMonth()+1)).slice(-2) + ("0"+now.getDate()).slice(-2) + "_" + ("0"+now.getHours()).slice(-2) + ("0"+now.getMinutes()).slice(-2);
            const fileName = `G${groupId}_${val}_${timeStr}`;
            const currentElapsed = document.getElementById("elapsed").innerText;
            const detail = val.startsWith('M') ? getMissionText(val.slice(1)).text : SUB_POOL.find(s=>s.id===val).t;

            try {
                const res = await fetch(POST_URL, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ groupId, missionNum: val, imageData: base64, fileName: fileName, missionDetail: detail, elapsedTime: currentElapsed })
                });

                if (res.ok) {
                    if(val.startsWith('M')) {
                        let h = JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]");
                        h.push({ num: val.slice(1), time: now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}), elapsedAt: currentElapsed });
                        localStorage.setItem(`logs_g${groupId}`, JSON.stringify(h));
                    } else {
                        let s = JSON.parse(localStorage.getItem(`sub_logs_g${groupId}`) || "[]");
                        s.push(val); localStorage.setItem(`sub_logs_g${groupId}`, JSON.stringify(s));
                    }
                    fileInput.value = ""; refreshUI();
                } else { alert("送信エラー。電波の良い場所で再送してください。"); }
            } catch (e) { alert("送信失敗。"); }
            btn.disabled = false; btn.innerText = "ミッション完了報告を送信";
        };
    }

    async function sendGoalNotification() {
        const btn = document.getElementById("goalBtn");
        btn.disabled = true; btn.innerText = "通知送信中...";
        try {
            await fetch(POST_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ groupId, missionNum: "GOAL", status: "completed" }) });
            btn.innerText = "✅ 本部へ通知しました！"; btn.style.background = "#2ecc71";
        } catch (e) { alert("通知失敗。そのまま本部へお越しください。"); }
    }

    // --- タイマー管理 ---
    const storageKey = `startTime_g${groupId}`;
    if (!localStorage.getItem(storageKey)) localStorage.setItem(storageKey, new Date().getTime());
    const START_TIME = parseInt(localStorage.getItem(storageKey));
    setInterval(() => {
        if (timerPaused) return;
        const now = new Date();
        const elapsedMs = now.getTime() - START_TIME;
        document.getElementById("elapsed").innerText = new Date(elapsedMs).toISOString().substr(11, 8);
        const diff = GOAL_TIME - now;
        document.getElementById("remaining").innerText = diff > 0 ? new Date(diff).toISOString().substr(11, 8) : "00:00:00";
    }, 1000);

    window.onload = refreshUI;
</script>
</body>
</html>
