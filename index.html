<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街歩きミッション・コントロール</title>
    <style>
        body { background: #121212; color: #00ffcc; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 15px; text-align: center; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        h1 { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px; }
        .group-display { font-size: 2rem; color: #fff; font-weight: bold; margin-bottom: 10px; }
        
        /* タイマーエリア */
        .timer-container { display: flex; justify-content: space-around; border-top: 1px solid #333; margin-top: 10px; padding-top: 15px; }
        .timer-box { flex: 1; }
        .timer-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .timer-value { font-size: 1.6rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        #elapsed { color: #00ffcc; }
        #remaining { color: #ffcc00; }

        /* ミッショングリッド */
        .mission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .panel { 
            aspect-ratio: 1/1; background: #2d2d2d; border: 2px dashed #444; border-radius: 15px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            position: relative; overflow: hidden; transition: 0.3s; cursor: pointer;
            background-size: cover; background-position: center; /* 写真表示用 */
        }
        .panel:active { transform: scale(0.95); }
        
        /* 完了後のスタイル（写真背景） */
        .panel.cleared { border: 2px solid #00ffcc; cursor: default; }
        .panel.cleared::after { /* 写真の上に黒マスクをかける */
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 1; border-radius: 13px;
        }
        
        .panel-label { font-size: 0.9rem; font-weight: bold; position: relative; z-index: 2; }
        .tap-hint { font-size: 0.6rem; color: #666; margin-top: 5px; position: relative; z-index: 2; }
        
        /* 完了後の文字色調整 */
        .panel.cleared .panel-label { color: #fff; }
        .panel.cleared .tap-hint { display: none; } /* TAPヒントは消す */

        /* スタンプ演出 */
        .stamp { 
            display: none; position: absolute; font-weight: bold; font-size: 1.2rem;
            color: #ff3366; border: 4px solid #ff3366; padding: 6px; border-radius: 8px;
            transform: rotate(-20deg); z-index: 3; /* マスクより上に表示 */
            background: rgba(255,255,255,0.8); /* スタンプの文字を見やすく */
        }
        .panel.cleared .stamp { display: block; animation: stampAnim 0.4s cubic-bezier(.17,.67,.83,.67); }
        .clear-time { font-size: 0.65rem; color: #ff3366; margin-top: 4px; font-weight: bold; }

        @keyframes stampAnim { 
            0% { transform: scale(4) rotate(0deg); opacity: 0; } 
            100% { transform: scale(1) rotate(-20deg); opacity: 1; }
        }

        /* モーダル */
        #modalOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content { background: #222; border: 2px solid #00ffcc; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; position: relative; }
        #modalMissionText { color: #fff; font-size: 1.5rem; font-weight: bold; line-height: 1.4; margin-bottom: 25px; }
        .pass-info { font-size: 0.9rem; color: #ffcc00; margin-bottom: 15px; font-weight: bold; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-close, .btn-pass { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-close { background: #444; color: #fff; }
        .btn-pass { background: #ffcc00; color: #000; }

        /* フォーム */
        select, input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        #sendBtn { background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #sendBtn:disabled { background: #444 !important; color: #777 !important; cursor: not-allowed; }

        /* ゴール演出用 */
        .congrats-card { background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%); border: 2px solid #ffcc00; animation: shine 2s infinite; }
        @keyframes shine { 0% { box-shadow: 0 0 10px #ffcc00; } 50% { box-shadow: 0 0 25px #ffcc00; } 100% { box-shadow: 0 0 10px #ffcc00; } }
        .congrats-text { font-size: 1.6rem; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .result-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #ffcc00; }
        .navi-text { font-size: 1.1rem; color: #fff; background: #c0392b; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        #goalBtn { background: #e67e22; color: white; font-size: 1.2rem; border: none; cursor: pointer; box-shadow: 0 4px #d35400; transition: 0.2s; }
    </style>
</head>
<body>

<div class="card">
    <div id="groupDisplay" class="group-display">GROUP --</div>
    <div class="timer-container">
        <div class="timer-box">
            <div class="timer-label">ミッション経過</div>
            <div id="elapsed" class="timer-value">00:00:00</div>
        </div>
        <div class="timer-box" style="border-left: 1px solid #333;">
            <div class="timer-label">残り時間</div>
            <div id="remaining" class="timer-value">--:--:--</div>
        </div>
    </div>
</div>

<div class="card" id="missionCard">
    <h1>Mission Progress (タップで詳細)</h1>
    <div class="mission-grid">
        <div class="panel" id="p1" onclick="openMission(1)"><div class="panel-label">ミッション 1</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t1"></div></div></div>
        <div class="panel" id="p2" onclick="openMission(2)"><div class="panel-label">ミッション 2</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t2"></div></div></div>
        <div class="panel" id="p3" onclick="openMission(3)"><div class="panel-label">ミッション 3</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t3"></div></div></div>
        <div class="panel" id="p4" onclick="openMission(4)"><div class="panel-label">ミッション 4</div><div class="tap-hint">TAP TO OPEN</div><div class="stamp">完了！<div class="clear-time" id="t4"></div></div></div>
    </div>
</div>

<div id="modalOverlay"><div class="modal-content">
    <div id="modalMissionTitle" style="color:#00ffcc; font-size:1.2rem; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">ミッション内容</div>
    <div id="modalMissionText">内容を読み込み中...</div>
    <div class="pass-info">【全体共通】残りパス: <span id="passCount">--</span>/4回</div>
    <div class="modal-btns"><button class="btn-pass" id="passBtn" onclick="passMission()">パスして引き直す</button><button class="btn-close" onclick="closeMission()">閉じる</button></div>
</div></div>

<div class="card" id="inputCard">
    <h1>Mission Submission</h1>
    <select id="missionNum">
        <option value="1">ミッション 1 を報告</option><option value="2">ミッション 2 を報告</option>
        <option value="3">ミッション 3 を報告</option><option value="4">ミッション 4 を報告</option>
    </select>
    <input type="file" id="photoInput" accept="image/*">
    <button id="sendBtn" onclick="sendData()">ミッション完了報告を送信</button>
</div>

<script>
    // --- 1. 設定項目 ---
    const MISSION_POOL = ["歴史を感じる門の前で自撮りせよ", "一番カラフルなものを全員で囲め", "銅像と同じポーズで撮れ", "青い看板の店を探せ", "全員の影が面白く映るように撮れ", "階段の途中で躍動感を撮れ", "全員が地面に足がついていない瞬間を撮れ", "自然な街角スナップを撮れ", "街路樹を背景に全員で撮れ", "マスコットキャラクターを探せ", "一番高い建物を見上げろ", "水辺で涼しげな集合写真を撮れ"];
    const POST_URL = "https://defaultce7b79c559554825ab1fb5c84e9e63.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a0c68a0b0f724618898d1e98ea02a174/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Ntxy587vPD_sKfECziby9_yqeew3a_OuWxq3m1FFRdc"; 
    const GOAL_TIME = new Date(2026, 3, 3, 16, 0, 0); 
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get('g') || "未設定";
    document.getElementById("groupDisplay").innerText = `GROUP ${groupId}`;

    let currentOpenMissionIndex = 0;
    let timerPaused = false;
    window.pendingPhoto = null;

    // --- 2. サウンド演出 ---
    function playStampSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
            osc1.type = 'triangle'; osc1.frequency.setValueAtTime(150, now);
            osc1.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gain1.gain.setValueAtTime(0.5, now); gain1.gain.linearRampToValueAtTime(0, now + 0.1);
            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc1.start(now); osc1.stop(now + 0.1);
            [523.25, 659.25, 783.99, 987.77].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                const startTime = now + 0.05 + (i * 0.05);
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime); gain.gain.linearRampToValueAtTime(0.1, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + 0.6);
            });
        } catch(e) {}
    }

    function playFanfareSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const notes = [{f: 523.25, t: 0.1}, {f: 523.25, t: 0.2}, {f: 523.25, t: 0.3}, {f: 659.25, t: 0.5}, {f: 783.99, t: 0.7}, {f: 1046.50, t: 1.0}];
            notes.forEach(n => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(n.f, now + n.t);
                gain.gain.setValueAtTime(0, now + n.t); gain.gain.linearRampToValueAtTime(0.1, now + n.t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + n.t + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + n.t); osc.stop(now + n.t + 0.5);
            });
        } catch(e) {}
    }

    // --- 3. ロジック：パス・ミッション ---
    function getMissionText(mIndex) {
        const seed = parseInt(groupId) || 0;
        const myPassedIds = JSON.parse(localStorage.getItem(`passed_g${groupId}_m${mIndex}`) || "[]");
        let allPassedIds = [];
        for(let i=1; i<=4; i++) { allPassedIds = allPassedIds.concat(JSON.parse(localStorage.getItem(`passed_g${groupId}_m${i}`) || "[]")); }
        let available = MISSION_POOL.filter((_, i) => !allPassedIds.includes(i));
        let idx = (seed * 7 + mIndex * 13 + myPassedIds.length * 31) % available.length;
        return { text: available[idx], rawIndex: MISSION_POOL.indexOf(available[idx]) };
    }
    function getTotalPassCount() {
        let count = 0;
        for(let i=1; i<=4; i++) count += JSON.parse(localStorage.getItem(`passed_g${groupId}_m${i}`) || "[]").length;
        return count;
    }
    function openMission(num) {
        if (JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]").find(h => h.num == num)) return;
        currentOpenMissionIndex = num;
        const mission = getMissionText(num); const totalPassed = getTotalPassCount();
        document.getElementById("modalMissionTitle").innerText = `ミッション ${num}`;
        document.getElementById("modalMissionText").innerText = mission.text;
        document.getElementById("passCount").innerText = 4 - totalPassed;
        document.getElementById("passBtn").disabled = totalPassed >= 4;
        document.getElementById("modalOverlay").style.display = "flex";
    }
    function closeMission() { document.getElementById("modalOverlay").style.display = "none"; }
    function passMission() {
        if (getTotalPassCount() < 4) {
            let pIds = JSON.parse(localStorage.getItem(`passed_g${groupId}_m${currentOpenMissionIndex}`) || "[]");
            pIds.push(getMissionText(currentOpenMissionIndex).rawIndex);
            localStorage.setItem(`passed_g${groupId}_m${currentOpenMissionIndex}`, JSON.stringify(pIds));
            openMission(currentOpenMissionIndex);
        }
    }

    // --- 4. タイマー ---
    const storageKey = `startTime_g${groupId}`;
    if (!localStorage.getItem(storageKey)) localStorage.setItem(storageKey, new Date().getTime());
    const START_TIME = parseInt(localStorage.getItem(storageKey));

    function updateTimers() {
        if (timerPaused) return;
        const now = new Date();
        const elapsedMs = now.getTime() - START_TIME;
        const eH = Math.floor(elapsedMs / 3600000).toString().padStart(2, '0');
        const eM = Math.floor((elapsedMs % 3600000) / 60000).toString().padStart(2, '0');
        const eS = Math.floor((elapsedMs % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById("elapsed").innerText = `${eH}:${eM}:${eS}`;
        const diff = GOAL_TIME - now;
        if (diff <= 0) { document.getElementById("remaining").innerText = "00:00:00"; return; }
        const rH = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const rM = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const rS = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById("remaining").innerText = `${rH}:${rM}:${rS}`;
    }
    setInterval(updateTimers, 1000);

    // --- 5. UI更新・本部通知 ---
    async function sendGoalNotification() {
        const btn = document.getElementById("goalBtn");
        btn.disabled = true; btn.innerText = "通知送信中...";
        try {
            const res = await fetch(POST_URL, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ groupId, missionNum: "GOAL", elapsedTime: document.getElementById("elapsed").innerText, status: "completed" })
            });
            if (res.ok) { btn.innerText = "✅ 本部へ通知しました！"; btn.style.background = "#2ecc71"; }
        } catch (e) { alert("通知エラー。そのまま本部へお越しください！"); btn.disabled = false; btn.innerText = "今から本部に行く（再試行）"; }
    }

    function refreshUI() {
        const history = JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]");
        const clearedMissions = history.map(log => log.num);
        
        history.forEach(log => {
            const p = document.getElementById(`p${log.num}`); 
            const t = document.getElementById(`t${log.num}`);
            if(p) {
                p.classList.add('cleared');
                // ★記憶されているBase64写真を背景に設定
                if (log.photo) {
                    p.style.backgroundImage = `url(data:image/jpeg;base64,${log.photo})`;
                }
            }
            if(t) t.innerText = log.time;
        });
        
        const select = document.getElementById("missionNum");
        for (let i = select.options.length - 1; i >= 0; i--) { if (clearedMissions.includes(select.options[i].value)) select.remove(i); }

        if (history.length >= 4) {
            timerPaused = true;
            const finalElapsed = history[history.length-1].elapsedAt;
            document.getElementById("elapsed").innerText = finalElapsed;
            const totalPass = getTotalPassCount();
            document.getElementById("inputCard").className = "card congrats-card";
            document.getElementById("inputCard").innerHTML = `
                <div class="congrats-text">🎉 MISSION COMPLETE!!</div>
                <div class="result-box">
                    <div style="font-size: 0.8rem; color: #ffcc00;">TOTAL CLEAR TIME</div>
                    <div style="font-size: 2.2rem; font-weight: bold; color: #fff;">${finalElapsed}</div>
                    <div style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">使用したパス： <span style="color:#fff; font-size:1.1rem;">${totalPass}</span> / 4回</div>
                </div>
                <button id="goalBtn" onclick="sendGoalNotification()">🚩 今から本部に行く</button>
                <p style="color:#fff; font-size: 0.8rem; margin-top:10px;">ボタンを押すと本部に到着予定が伝わります</p>
                <div class="navi-text">🚩 長浜バイオ大学サテライトオフィスへ向かい、この画面を提示してください！</div>
            `;
        }
    }

    // --- 6. 送信ロジック（フォト・スタンプ対応版） ---
    async function sendData() {
        const btn = document.getElementById("sendBtn");
        const mNum = document.getElementById("missionNum").value;
        const fileInput = document.getElementById("photoInput");

        if (!window.pendingPhoto && (!fileInput.files[0] || groupId === "未設定")) {
            return alert("画像を選んでください。");
        }

        if (!window.pendingPhoto) {
            btn.disabled = true;
            btn.innerText = "画像を処理中...";
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                // ここで縮小処理を入れることも可能だが、まずはそのままBase64化
                window.pendingPhoto = reader.result.split(',')[1];
                executeUpload();
            };
        } else {
            executeUpload();
        }

        async function executeUpload() {
            btn.disabled = true;
            btn.innerText = "送信中... (電波を確認！)";
            const currentElapsed = document.getElementById("elapsed").innerText;
            const missionText = getMissionText(mNum).text;

            try {
                // 1. まずは Power Automate へ送信
                const res = await fetch(POST_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        groupId, missionNum: mNum, imageData: window.pendingPhoto, 
                        elapsedTime: currentElapsed, missionDetail: missionText 
                    })
                });

                if (res.ok || res.status === 202) {
                    // 2. 送信成功したら、履歴に写真（Base64）も含めて保存
                    const history = JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]");
                    history.push({ 
                        num: mNum, 
                        time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}), 
                        elapsedAt: currentElapsed,
                        photo: window.pendingPhoto // ★写真をスマホに記憶させる
                    });
                    localStorage.setItem(`logs_g${groupId}`, JSON.stringify(history));
                    
                    window.pendingPhoto = null; 
                    fileInput.value = ""; 
                    btn.style.background = "#00ffcc";

                    if (history.length >= 4) { playFanfareSound(); } else { playStampSound(); }
                    refreshUI(); // これで背景が変わるアニメーションが走る
                } else {
                    throw new Error("通信エラー");
                }
            } catch (e) {
                alert("送信に失敗しました。電波の良い場所に移動して、もう一度『再送する』ボタンを押してください。");
                btn.innerText = "❌ 送信失敗：再送する";
                btn.style.background = "#ff3366";
            } finally {
                const historyCheck = JSON.parse(localStorage.getItem(`logs_g${groupId}`) || "[]");
                if (historyCheck.length < 4) {
                    setTimeout(() => {
                        btn.disabled = false;
                        if (!window.pendingPhoto) {
                            btn.innerText = "ミッション完了報告を送信";
                            btn.style.background = "#00ffcc";
                        }
                    }, 800);
                }
            }
        }
    }
    window.onload = refreshUI;
</script>
</body>
</html>
